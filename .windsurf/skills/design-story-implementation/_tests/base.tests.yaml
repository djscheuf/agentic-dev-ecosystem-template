# ========================================
# DETERMINISTIC EVALUATIONS (contains/equiv)
# ========================================
- vars:
    analysis: '@../.windsurf/skills/analyze-story/_tests/_data/admin-tactic-types.analysis.json'
    current_reality: '@../.windsurf/skills/analyze-story/_tests/_data/admin-tactic-types.audit.json'
  description: 'Canary Test'
  assert:
    - type: contains
      value: 'layer_responsibilities'

# ========================================
# RUBRIC-BASED EVALUATIONS WITH SCORING
# ========================================
# Each llm-rubric assertion evaluates a single quality dimension independently.
# - threshold: minimum score (0.0–1.0) required to pass this assertion
# - metric:    named label shown in the promptfoo web UI results table
# - weight:    relative importance when computing the overall test score
#
# This lets you see per-dimension scores, set different pass bars for
# critical vs. nice-to-have criteria, and weight what matters most.

- vars:
    analysis: '@../.windsurf/skills/analyze-story/_tests/_data/admin-tactic-types.analysis.json'
    current_reality: '@../.windsurf/skills/analyze-story/_tests/_data/admin-tactic-types.audit.json'
  description: 'Happy Path'
  assert:
    # Core definition
    - type: llm-rubric
      value: "Response succinctly models User's flow thru the application for the given story"
      threshold: 0.8
      metric: user-flow
      weight: 2
    - type: llm-rubric
      value: "Response defines instrumentation events, using `VerbObjectContext` naming pattern, events emerge from User flow."
      threshold: 0.8
      metric: instrumentation
      weight: 1
    - type: llm-rubric
      value: "Response assigns layer responsibilities, using responsibility heuristics. Front-end: Display, Accessibility, Sequence. Backend: Business logic, Security, Performance, Scope, Caching. Database: Data storage, Data integrity, Heavy computations."
      threshold: 0.8
      metric: responsibilities
      weight: 4
    - type: llm-rubric
      value: "Response defines contracts between layers, using responsibility heuristics. Data model first. Frontend needs drive backend requirements. Backend needs drive data layer requirements."
      threshold: 0.8
      metric: contracts
      weight: 2
    - type: llm-rubric
      value: "Response identifies architectural decisions, documents rationale, favors existing ADRs, and calls out deviations."
      threshold: 0.8
      metric: adrs
      weight: 2
    - type: llm-rubric
      value: "Response documents ambiguities with assumed answers and basis/rationale for each assumption, justifying assumptions with industry standard practice or specific ADRs for the repo."
      threshold: 0.8
      metric: assumptions
      weight: 4
    

# ========================================
# SCRIPT-BASED DETERMINISTIC EVALUATIONS
# ========================================
# These evaluations call functions exported from eval-script.js directly.
# Syntax: file://path/to/script.js:functionName

- vars:
    analysis: '@../.windsurf/skills/analyze-story/_tests/_data/admin-tactic-types.analysis.json'
    current_reality: '@../.windsurf/skills/analyze-story/_tests/_data/admin-tactic-types.audit.json'
  description: 'Output Schema Validation - Script Based'
  assert:
    - type: javascript
      value: file://./eval-script.js:matchesSchema
      config:
        schemaPath: '../.windsurf/skills/design-story-implementation/schema/design.schema.json'
