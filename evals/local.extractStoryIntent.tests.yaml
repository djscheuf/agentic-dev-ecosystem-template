# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Ollama - EDD on Extract Intent Skill

# Define prompts to test - template that includes base prompt
prompts:
  - file://../.windsurf/skills/extract-story-intent/_tests/prompt.md

# External evaluation script for custom deterministic evaluations
# This script contains custom assertion functions used in tests
defaultTest:
  options:
    # ========================================
    # RUBRIC GRADER — NODE.JS (Cross-platform)
    # ========================================
    # Combined scripts auto-detect mode: provider vs grader
    # Grader mode: prompt is JSON array [{role, content}, ...]
    # Provider mode: prompt is plain text
    #
    # Reference provider by label from providers section below
    provider: 'Ollama Mistral'

    
# Use devin cli as a provider via script execution
providers:
  # ========================================
  # NODE.JS VERSIONS (Cross-platform)
  # ========================================
  # Combined scripts auto-detect mode: provider vs grader
  # Grader mode: prompt is JSON array [{role, content}, ...]
  # Provider mode: prompt is plain text
  #
  # Devin CLI provider — ACTIVE
  # - id: 'exec: node ./devin.js'
  #   label: 'Haiku'
  #   config:
  #     model: 'claude-haiku-4.5'
      
  # - id: 'exec: node ./devin.js'
  #   label: 'SWE-1.7'
  #   config:
  #     model: 'SWE-1.7'

  # Ollama provider
  - id: 'exec: node ./ollama.js'
    # label: 'Ollama Qwen'
    label: 'Ollama Mistral'
    config:
      host: localhost # defaults to localhost
      port: 1234 # defaults to 11434
      endpoint: '/api/v1/chat' # defaults to api/v1/chat
      # model: 'qwen/qwen3-8b' # defaults to llama2
      model: 'mistralai/mistral-7b-instruct-v0.3'
      documentRoot: '../.windsurf/skills/extract-story-intent/_tests'

# Test cases loaded from external file
tests: 
  - file://../.windsurf/skills/extract-story-intent/_tests/tests.yaml

# Output configuration
outputPath: results.extractStoryIntent.html