# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: EDD on Design Story Implementation skill

# Define prompts to test - template that includes base prompt
prompts:
  - file://../.windsurf/skills/design-story-implementation/_tests/prompt.md

# External evaluation script for custom deterministic evaluations
# This script contains custom assertion functions used in tests
defaultTest:
  options:
    # ========================================
    # RUBRIC GRADER — NODE.JS (Cross-platform)
    # ========================================
    # Combined scripts auto-detect mode: provider vs grader
    # Grader mode: prompt is JSON array [{role, content}, ...]
    # Provider mode: prompt is plain text
    #
    # Devin CLI grader — ACTIVE
    provider: 'SWE-1.7'
    
# Use devin cli as a provider via script execution
providers:
  # ========================================
  # NODE.JS VERSIONS (Cross-platform)
  # ========================================
  # Combined scripts auto-detect mode: provider vs grader
  # Grader mode: prompt is JSON array [{role, content}, ...]
  # Provider mode: prompt is plain text
  #
  # Devin CLI provider — ACTIVE
  # - id: 'exec: node ./devin.js'
  #   label: 'Haiku'
  #   config:
  #     model: 'claude-haiku-4.5'

  - id: 'exec: node ./devin.js'
    label: 'SWE-1.7'
    config:
      model: 'SWE-1.7'
  
  # - id: 'exec: node ./devin.js'
  #   label: 'Sonnet'
  #   config:
  #     model: 'claude-sonnet-4.6'

# Test cases loaded from external file
tests: 
  - file://../.windsurf/skills/design-story-implementation/_tests/base.tests.yaml
  # - file://../.windsurf/skills/design-story-implementation/_tests/partial_slice.tests.yaml

# Output configuration
outputPath: results.designImplementation.html